<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg { fill: transparent; }
    .net { stroke: #111827; stroke-width: 6; fill: none; }
    .pt { fill: #111827; }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1F2937; } /* Subtle gray background so it doesn't get lost in dark tabs */
      .net { stroke: #F9FAFB; }
      .pt { fill: #F9FAFB; }
    }
  </style>
  <!-- Background circle strictly for dark mode contrast -->
  <circle cx="50" cy="50" r="50" class="bg" />
  
  <!-- Your Original Network Graph Design -->
  <path d="M25,75 L50,25 L75,65 Z M50,25 L50,55" class="net" stroke-linejoin="round"/>
  <circle cx="25" cy="75" r="10" class="pt"/>
  <circle cx="75" cy="65" r="10" class="pt"/>
  <circle cx="50" cy="25" r="10" class="pt"/>
  <circle cx="50" cy="55" r="6" class="pt"/>
</svg>
