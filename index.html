<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse3D — 3D Knowledge Graph, Hand-Controlled</title>
    <meta name="description" content="Browser-based 3D knowledge graph navigated by hand gestures via webcam." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <video id="hand-video" autoplay muted playsinline hidden></video>
    <div id="graph"></div>
    <canvas id="hand-overlay" hidden></canvas>
    <div id="selection-panel" hidden></div>
    <div id="gesture-hud" role="status" aria-live="polite" hidden></div>
    <div id="voice-status" role="status" aria-live="polite" hidden></div>
    <div id="gesture-legend" hidden></div>
    <button id="pick-vault" hidden>Pick Vault Folder</button>
    <button id="change-vault" hidden>Change Vault</button>
    <button id="enable-tracking" type="button" hidden>Enable Hand Tracking</button>
    <button id="voice-toggle" type="button" hidden>Voice ON</button>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
